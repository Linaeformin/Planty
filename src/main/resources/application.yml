spring:
  application:
    name: Centralthon

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/Centralthon?serverTimezone=UTC
    username: back
    password: 1234

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  level:
    org:
      hibernate:
        SQL: debug
        type:
          descriptor:
            sql: trace

jwt:
  secret: "change-this-to-a-very-long-random-secret-at-least-256-bits"
  access-exp-millis: 86400000     # 1시간

app:
  upload-dir: uploads

# 파라미터 스토어 (옵션)
parameter-store:
  enabled: ${PARAMETER_STORE_ENABLED:false}
  region: ${AWS_REGION:us-east-1}
  prefix: ${PARAMETER_PREFIX:/planty}

# AI 모델 및 파라미터 설정
ai:
  openai:
    api-key: ${OPENAI_API_KEY}
    timeout: 60
    maxRetries: 3
    enableLogging: false
  crop-registration:
    model: gpt-4o-mini
    max-tokens: 1000
    temperature: 0.1
  crop-diagnosis:
    model: gpt-4o
    max-tokens: 1500
    temperature: 0.2
