spring:
  application:
    name: Centralthon

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/Centralthon?serverTimezone=UTC
    username: back
    password: 1234

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    time-zone: Asia/Seoul

logging:
  level:
    root: info               # 전체 기본 로그 레벨
    org.springframework: debug   # 스프링 내부 로그를 보고 싶으면 debug
    org.hibernate.SQL: warn     # SQL 로그
    org.hibernate.type.descriptor.sql: trace   # 바인딩된 파라미터 값까지

server:
  error:
    include-stacktrace: never       # trace 필드 제거
    include-exception: false        # exception 필드 제거
    include-message: never          # 기본 메시지도 숨김(디버깅 때만 on_param로)
    include-binding-errors: never

jwt:
  secret: "change-this-to-a-very-long-random-secret-at-least-256-bits"
  access-exp-millis: 86400000     # 1시간

app:
  upload-dir: uploads

# 파라미터 스토어 (옵션)
parameter-store:
  enabled: ${PARAMETER_STORE_ENABLED:false}
  region: ${AWS_REGION:us-east-1}
  prefix: ${PARAMETER_PREFIX:/planty}

# AI 모델 및 파라미터 설정
ai:
  openai:
    api-key: ${OPENAI_API_KEY}
    url: ${OPENAI_API_URL:https://api.openai.com/v1/responses}
    timeout: 60
    max-retries: 3

  # 기능별 프리셋
  plant-analysis:
    model: gpt-4o-mini
    max-tokens: 1000
    temperature: 0.1

  crop-diagnosis:
    model: gpt-4o
    max-tokens: 1500
    temperature: 0.2

  diary-integrated:
    model: gpt-4o-mini
    max-tokens: 1200
    temperature: 0.2

  diary-disease:
    model: gpt-4o
    max-tokens: 1400
    temperature: 0.2

  diary-market:
    model: gpt-4o-mini
    max-tokens: 1200
    temperature: 0.3

